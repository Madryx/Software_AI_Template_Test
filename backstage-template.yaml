apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-devops-scaffolder
  title: AI DevOps Scaffolder
  description: AI-powered DevOps file generator for any repository
  tags:
    - ai
    - devops
    - cicd
spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Repository
      properties:
        repoUrl:
          title: GitHub Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts: ['github.com']
        branch:
          title: Branch
          type: string
          default: main

    - title: CI/CD Configuration
      properties:
        ciProvider:
          title: CI Provider
          type: string
          enum: ['jenkins', 'github-actions', 'gitlab-ci']
          default: jenkins
        cdProvider:
          title: CD Provider
          type: string
          enum: ['argocd', 'github-actions-cd']
          default: argocd
        registry:
          title: Container Registry
          type: string
          enum: ['dockerhub', 'ghcr']
          default: dockerhub
        dockerhubUser:
          title: DockerHub Username
          type: string
        namespace:
          title: Kubernetes Namespace
          type: string
          default: default

  steps:
    - id: ai-scaffold
      name: AI Generate DevOps Files
      action: ai:scaffold:devops
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branch: ${{ parameters.branch }}
        ciProvider: ${{ parameters.ciProvider }}
        cdProvider: ${{ parameters.cdProvider }}
        registry: ${{ parameters.registry }}
        namespace: ${{ parameters.namespace }}
        dockerhubUser: ${{ parameters.dockerhubUser }}

  output:
    text:
      - title: Results
        content: |
          **Detected Language:** ${{ steps['ai-scaffold'].output.detectedLanguage }}
          **Detected Framework:** ${{ steps['ai-scaffold'].output.detectedFramework }}
          **Generated Files:** ${{ steps['ai-scaffold'].output.generatedFiles }}
