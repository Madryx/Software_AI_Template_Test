apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: ai-devops-scaffolder
  title: AI Template Scaffolding
  description: AI-driven CI/CD + GitOps scaffolding for existing repositories
  tags:
    - ai
    - devops
    - cicd
    - gitops
    - argocd
    - jenkins

spec:
  owner: development
  type: service

  parameters:

    - title: Repository & Target Environment
      required:
        - scmServer
        - repo
        - language
        - environment
        - targetLocation
      properties:
        scmServer:
          title: SCM Server
          type: string
          description: Source Control Management server where your repository is hosted
          enum:
            - github
            - gitlab
            - bitbucket
            - azure-devops
            - gitea
          enumNames:
            - GitHub
            - GitLab
            - Bitbucket
            - Azure DevOps
            - Gitea
          default: github
        repo:
          title: Repository Name
          type: string
          description: GitHub repo name under BackstageSSPPoC org
          ui:autofocus: true
        language:
          title: Application Language
          type: string
          description: Primary language/runtime of the application
          enum:
            - python
            - java
            - nodejs
          enumNames:
            - Python
            - Java
            - Node.js
          default: python
        branch:
          title: Source Branch
          type: string
          default: main
          ui:disabled: true
        environment:
          title: Target Environment
          type: string
          enum:
            - dev
            - qa
            - prod
          enumNames:
            - Dev
            - Test
            - Prod
          default: dev
        targetLocation:
          title: Target Location
          type: string
          description: Infrastructure target where the application will be deployed
          enum:
            - kubernetes
            - vm
            - bare-metal
            - ecs
            - lambda
          enumNames:
            - Kubernetes Cluster
            - Virtual Machine (VM)
            - Bare Metal Server
            - AWS ECS
            - AWS Lambda (Serverless)
          default: kubernetes

    - title: CI/CD & Registry
      required:
        - ciProvider
        - cdProvider
        - registry
      properties:
        ciProvider:
          title: CI Provider
          type: string
          enum:
            - jenkins
            - github-actions
            - gitlab-ci
          enumNames:
            - Jenkins
            - GitHub Actions
            - GitLab CI
          default: jenkins
        cdProvider:
          title: CD Provider
          type: string
          enum:
            - argocd
            - github-actions-cd
            - gitlab-cd
          enumNames:
            - ArgoCD (GitOps)
            - GitHub Actions CD
            - GitLab CD
          default: argocd
        registry:
          title: Container Registry
          type: string
          enum:
            - dockerhub
            - ghcr
          enumNames:
            - DockerHub
            - GitHub Container Registry (GHCR)
          default: dockerhub
        dockerhubUser:
          title: DockerHub Username
          type: string
          description: Required when registry is DockerHub

    - title: Kubernetes & Features
      properties:
        replicas:
          title: Replicas
          type: number
          default: 1
        enableIngress:
          title: Enable Ingress
          type: boolean
          default: true
        enableSonar:
          title: Enable SonarQube Analysis
          type: boolean
          default: true

  steps:

    # ── STEP 1: AI analyzes repo, detects stack, writes files to workspace ──
    - id: ai-scaffold
      name: "AI: Analyze Repo & Generate DevOps Files"
      action: ai:scaffold:devops
      input:
        repoUrl: "github.com?owner=BackstageSSPPoC&repo=${{ parameters.repo }}"
        branch: ${{ parameters.branch }}
        componentOwner: ${{ user.entity.metadata.name }}
        language: ${{ parameters.language }}
        environment: ${{ parameters.environment }}
        targetLocation: ${{ parameters.targetLocation }}
        ciProvider: ${{ parameters.ciProvider }}
        cdProvider: ${{ parameters.cdProvider }}
        registry: ${{ parameters.registry }}
        dockerhubUser: ${{ parameters.dockerhubUser }}
        namespace: ${{ parameters.environment }}
        replicas: ${{ parameters.replicas }}
        enableIngress: ${{ parameters.enableIngress }}
        enableSonar: ${{ parameters.enableSonar }}
        customBuildCommand: ${{ parameters.customBuildCommand }}
        customTestCommand: ${{ parameters.customTestCommand }}

    # ── STEP 2: Push all generated files to a new branch + open PR ──
    - id: github-push
      name: "GitHub: Push Files & Open Pull Request"
      action: github:push
      input:
        repoUrl: "github.com?owner=BackstageSSPPoC&repo=${{ parameters.repo }}"
        branch: ${{ parameters.branch }}
        commitMessage: "chore(ai-devops): scaffold CI/CD for ${{ parameters.environment }} [${{ parameters.language }}/${{ steps['ai-scaffold'].output.detectedFramework }}]"

  output:
    links:
      - title: View Repository
        url: "https://github.com/BackstageSSPPoC/${{ parameters.repo | trim }}"
